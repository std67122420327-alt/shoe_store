{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container" style="margin-top: 5rem; margin-bottom: 5rem;">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card" style="border: none; border-radius: 45px; padding: 60px; background: white; box-shadow: 0 20px 50px rgba(255, 51, 133, 0.15);">
          
          <div class="text-center mb-5">
            <div style="font-size: 6rem; background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px;">
              <i class="bi bi-shield-lock"></i>
            </div>
            <h1 class="fw-bold" style="color: #333;">{{title}}</h1>
            <p class="text-muted">กรุณากรอกรหัสผ่านใหม่เพื่อความปลอดภัยของบัญชีรองเท้าคุณ</p>
          </div>

          <form method="post">
            <div class="mb-5">
              <label for="old_password" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-lock" style="color: #ff3385;"></i> Old Password
              </label>
              <input name="old_password" type="password" class="form-control" id="old_password" required style="border-radius: 35px; padding: 20px; border: 4px solid #ffe6f0; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="new_password" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-key" style="color: #ff3385;"></i> New Password
              </label>
              <input name="new_password" type="password" class="form-control" id="new_password" required style="border-radius: 35px; padding: 20px; border: 4px solid #ffe6f0; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="confirm_password" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-check2-circle" style="color: #ff3385;"></i> Confirm Password
              </label>
              <input name="confirm_password" type="password" class="form-control" id="confirm_password" required style="border-radius: 35px; padding: 20px; border: 4px solid #ffe6f0; background-color: #fdf2f7;">
            </div>

            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); color: white; border: none; border-radius: 35px; padding: 20px; font-weight: 800; font-size: 1.4rem; box-shadow: 0 10px 25px rgba(255, 51, 133, 0.3);">
              <i class="bi bi-check-circle"></i>
           Change Password  
            </button>
          </form>
          
        </div>
      </div>
    </div>
  </div>
{% endblock %}
