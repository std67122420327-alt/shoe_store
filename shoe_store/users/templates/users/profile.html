{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container" style="margin-top: 5rem; margin-bottom: 5rem;">
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="card" style="border: none; border-radius: 45px; padding: 60px; background: white; box-shadow: 0 20px 50px rgba(255, 51, 133, 0.15);">
          
          <div class="text-center mb-5">
            <div style="font-size: 7rem; background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;">
              <i class="bi bi-person-circle"></i>
            </div>
            <h1 class="display-5" style="font-weight: 800; color: #333;">{{title}}</h1>
          </div>

          <form class="row g-5" method="post">
            
            <div class="col-md-6">
              <label for="username" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-person" style="color: #ff3385;"></i> Username
              </label>
              <input disabled value="{{user.username}}" type="text" class="form-control" id="username" style="border-radius: 35px; padding: 20px; background: #fdf2f7; border: 3px solid #ffe6f0; font-size: 1.1rem;">
            </div>

            <div class="col-md-6">
              <label for="email" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-envelope" style="color: #ff3385;"></i> Email Address
              </label>
              <input disabled value="{{user.email}}" type="email" class="form-control" id="email" style="border-radius: 35px; padding: 20px; background: #fdf2f7; border: 3px solid #ffe6f0; font-size: 1.1rem;">
            </div>

            <div class="col-md-6">
              <label for="firstname" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-person-badge" style="color: #ff3385;"></i> Firstname
              </label>
              <input name="firstname" value="{{user.firstname}}" type="text" class="form-control" id="firstname" style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem;">
            </div>

            <div class="col-md-6">
              <label for="lastname" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-person-badge-fill" style="color: #ff3385;"></i> Lastname
              </label>
              <input name="lastname" value="{{user.lastname}}" type="text" class="form-control" id="lastname" style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem;">
            </div>
            
            <div class="col-12 mt-5">
              <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); color: white; border: none; border-radius: 35px; padding: 20px; font-weight: 800; font-size: 1.3rem; box-shadow: 0 10px 25px rgba(255, 51, 133, 0.3);">
                <i class="bi bi-save-fill"></i>
                Update Profile
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
