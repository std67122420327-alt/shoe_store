{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container" style="margin-top: 5rem; margin-bottom: 5rem;">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card" style="border: none; border-radius: 45px; padding: 60px; background: white; box-shadow: 0 20px 50px rgba(255, 51, 133, 0.15);">
          
          <div class="text-center mb-5">
            <div style="font-size: 6rem; background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px;">
              <i class="bi bi-person-circle"></i>
            </div>
            <h1 class="fw-bold" style="color: #333; letter-spacing: -1px;">Login To Shoe Store</h1>
          </div>

          <form method="post">
            <div class="mb-5">
              <label for="username" class="form-label" style="font-weight: 700; color: #444; font-size: 1.2rem;">
                <i class="bi bi-person" style="color: #ff3385;"></i> Username
              </label>
              <input name="username" type="text" class="form-control" id="username" required style="border-radius: 35px; padding: 20px; border: 4px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>
            
            <div class="mb-5">
              <label for="password" class="form-label" style="font-weight: 700; color: #444; font-size: 1.2rem;">
                <i class="bi bi-lock" style="color: #ff3385;"></i> Password
              </label>
              <input name="password" type="password" class="form-control" id="password" required style="border-radius: 35px; padding: 20px; border: 4px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>
            
            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); color: white; border: none; border-radius: 35px; padding: 20px; font-weight: 800; font-size: 1.4rem; box-shadow: 0 10px 25px rgba(255, 51, 133, 0.3);">
              <i class="bi bi-box-arrow-in-right"></i>
              SIGN IN
            </button>
          </form>

          <div class="text-center mt-5">
            <p style="font-size: 1.1rem;">Don't have an account? 
              <a href="{{ url_for('users.register') }}" style="color: #ff3385; font-weight: 700; text-decoration: none;">Register here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
