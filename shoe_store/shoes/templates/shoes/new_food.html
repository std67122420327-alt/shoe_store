{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container" style="margin-top: 5rem; margin-bottom: 5rem;">
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="card" style="border: none; border-radius: 45px; padding: 60px; background: white; box-shadow: 0 20px 50px rgba(255, 51, 133, 0.15);">
          
          <div class="mb-5">
            <h1 class="fw-bold" style="color: #333; letter-spacing: -1px;">
              <i class="bi bi-plus-circle-fill" style="color: #ff3385;"></i> {{title}}
            </h1>
            <p class="text-muted" style="font-size: 1.2rem;">กรอกข้อมูลรองเท้าคู่ใหม่ของคุณให้ครบถ้วน</p>
          </div>

          <form method="post">
            <div class="mb-5">
              <label for="name" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-tag" style="color: #ff3385;"></i> ชื่อรุ่นรองเท้า
              </label>
              <input name="name" type="text" class="form-control" id="name" required style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="price" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-cash-coin" style="color: #ff3385;"></i> ราคา (บาท)
              </label>
              <input name="price" type="text" class="form-control" id="price" required style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="description" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-card-text" style="color: #ff3385;"></i> รายละเอียดสินค้า (วัสดุ, ไซส์, จุดเด่น)
              </label>
              <textarea name="description" class="form-control" id="description" rows="5" style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;"></textarea>
            </div>

            <div class="mb-5">
              <label for="img_url" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-image" style="color: #ff3385;"></i> URL รูปภาพสินค้า
              </label>
              <input name="img_url" type="text" class="form-control" id="img_url" required style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="shoe_categories" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-collection" style="color: #ff3385;"></i> หมวดหมู่ / แบรนด์รองเท้า
              </label>
              <select name="shoe_categories" class="form-select" aria-label="shoe_categories" multiple style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7; min-height: 150px;">
                {% for cat in shoe_categories %}
                  <option value="{{cat.id}}" style="padding: 10px; border-radius: 10px; margin-bottom: 5px;">{{cat.name}}</option>
                {% endfor %}
              </select>
              <p class="mt-3 text-muted ms-3"><i class="bi bi-info-circle"></i> กด Ctrl หรือ Cmd ค้างไว้เพื่อเลือกหลายหมวดหมู่</p>
            </div>

            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); color: white; border: none; border-radius: 35px; padding: 20px; font-weight: 800; font-size: 1.5rem; box-shadow: 0 10px 25px rgba(255, 51, 133, 0.3);">
              <i class="bi bi-plus-circle me-2"></i>
              บันทึกรายการรองเท้าใหม่
            </button>
          </form>

          <div class="text-center mt-4">
            <a href="{{ url_for('shoe.index') }}" style="color: #ff3385; font-weight: 600; text-decoration: none; font-size: 1.1rem;">
              <i class="bi bi-x-circle"></i> ยกเลิกและกลับหน้าจัดการ
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
{% endblock %}
