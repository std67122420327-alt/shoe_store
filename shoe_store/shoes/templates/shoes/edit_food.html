{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container" style="margin-top: 5rem; margin-bottom: 5rem;">
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="card" style="border: none; border-radius: 45px; padding: 60px; background: white; box-shadow: 0 20px 50px rgba(255, 51, 133, 0.15);">
          
          <div class="mb-5">
            <h1 class="fw-bold" style="color: #333; letter-spacing: -1px;">
              <i class="bi bi-pencil-square" style="color: #ff3385;"></i> {{title}}
            </h1>
            <p class="text-muted" style="font-size: 1.2rem;">จัดการแก้ไขข้อมูลรองเท้าของคุณให้เป็นปัจจุบัน</p>
          </div>

          <form method="post" action="{{ url_for('shoe.edit_shoe', id=shoe.id) }}">
            
            <div class="mb-5">
              <label for="name" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-tag-fill" style="color: #ff3385;"></i> ชื่อรุ่นรองเท้า
              </label>
              <input name="name" type="text" class="form-control" id="name" value="{{shoe.name}}" required style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="price" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-cash-coin" style="color: #ff3385;"></i> ราคา (บาท)
              </label>
              <input name="price" type="text" class="form-control" id="price" value="{{shoe.price}}" required style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="description" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-card-text" style="color: #ff3385;"></i> รายละเอียดสินค้า
              </label>
              <textarea name="description" class="form-control" id="description" rows="5" style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">{{shoe.description}}</textarea>
            </div>

            <div class="mb-5">
              <label for="img_url" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-image" style="color: #ff3385;"></i> URL รูปภาพสินค้า
              </label>
              <input name="img_url" type="text" class="form-control" id="img_url" value="{{shoe.img_url}}" required style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7;">
            </div>

            <div class="mb-5">
              <label for="shoe_categories" class="form-label" style="font-weight: 700; color: #333; font-size: 1.2rem;">
                <i class="bi bi-collection" style="color: #ff3385;"></i> แบรนด์ / ประเภท
              </label>
              <select name="shoe_categories" class="form-select" aria-label="shoe_categories" multiple style="border-radius: 35px; padding: 20px; border: 3px solid #ffe6f0; font-size: 1.1rem; background-color: #fdf2f7; min-height: 180px;">
                {% for cat in shoe_categories %}
                  <option value="{{cat.id}}" {% if cat in shoe.categories %}selected{% endif %} style="padding: 10px; border-radius: 10px; margin-bottom: 5px;">{{cat.name}}</option>
                {% endfor %}
              </select>
              <p class="mt-3 text-muted ms-3"><i class="bi bi-info-circle"></i> กด Ctrl หรือ Cmd ค้างไว้เพื่อเลือกหลายรายการ</p>
            </div>

            <div class="d-grid gap-4 mt-5">
              <button type="submit" class="btn btn-lg" style="background: linear-gradient(135deg, #ff3385 0%, #ff85b3 100%); color: white; border: none; border-radius: 35px; padding: 20px; font-weight: 800; font-size: 1.4rem; box-shadow: 0 10px 25px rgba(255, 51, 133, 0.3);">
                <i class="bi bi-check-circle-fill me-2"></i>
                บันทึกการเปลี่ยนแปลงข้อมูล
              </button>
              
              <a href="{{ url_for('shoe.index') }}" class="btn btn-lg" style="background: #f8f9fa; color: #ff3385; border: 3px solid #ffe6f0; border-radius: 35px; padding: 20px; font-weight: 800; font-size: 1.2rem;">
                <i class="bi bi-x-circle me-2"></i>
                ยกเลิกและกลับไปหน้าเดิม
              </a>
            </div>
          </form>
          
        </div>
      </div>
    </div>
  </div>
{% endblock %}
